name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: test -f public/mobile-catalog/manifest.json
      - run: find public/mobile-catalog -maxdepth 1 -name 'entries.*.json' | grep -q .

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Install Swift 6.3 toolchain
        run: |
          curl -O https://download.swift.org/swiftly/linux/swiftly-$(uname -m).tar.gz
          tar zxf swiftly-$(uname -m).tar.gz
          ./swiftly init --quiet-shell-followup
          . "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/env.sh"
          hash -r
          swiftly install latest
          swiftly use latest
          swift --version
          swift --version | grep -q 'swift-6.3-RELEASE'
          echo "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/bin" >> "$GITHUB_PATH"
      - name: Install Swift Android SDK
        run: |
          swift sdk install https://download.swift.org/swift-6.3-release/android-sdk/swift-6.3-RELEASE/swift-6.3-RELEASE_android.artifactbundle.tar.gz --checksum 2f2942c4bcea7965a08665206212c66991dabe23725aeec7c4365fc91acad088
          SDK_BUNDLE="$HOME/.swiftpm/swift-sdks/swift-6.3-RELEASE_android.artifactbundle/swift-android"
          cd "$SDK_BUNDLE"
          curl -fSL -o ndk.zip https://dl.google.com/android/repository/android-ndk-r27d-$(uname -s).zip
          unzip -qo ndk.zip
          export ANDROID_NDK_HOME="$PWD/android-ndk-r27d"
          ./scripts/setup-android-sdk.sh
          rm -f ndk.zip
          echo "SWIFT_ANDROID_SDK_BUNDLE=$SDK_BUNDLE" >> "$GITHUB_ENV"
          swift sdk list
      - run: npm ci
      - run: npm run android:ci

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ios:ci

  shared-swift-core:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm run swift-core:test
