name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run android:prepare
      - run: node scripts/with-android-java.mjs ./android/gradlew -p android testDebugUnitTest assembleDebug

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ios:sync
      - run: xcodebuild -project "ios/App/The Devil's AI Dictionary.xcodeproj" -scheme "The Devil's AI Dictionary" -destination "generic/platform=iOS Simulator" build CODE_SIGNING_ALLOWED=NO

  shared-swift-core:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift test --package-path shared/swift-core
