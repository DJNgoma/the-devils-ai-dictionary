name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: test -f public/mobile-catalog/manifest.json
      - run: find public/mobile-catalog -maxdepth 1 -name 'entries.*.json' | grep -q .

  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run android:ci

  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ios:ci

  shared-swift-core:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm run swift-core:test
