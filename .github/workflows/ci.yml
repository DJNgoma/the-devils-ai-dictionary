name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_matrix:
        description: Run every CI lane regardless of changed paths
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web_content: ${{ steps.filter.outputs.web_content }}
      android: ${{ steps.filter.outputs.android }}
      apple: ${{ steps.filter.outputs.apple }}
      shared_swift_core: ${{ steps.filter.outputs.shared_swift_core }}
      full_matrix: ${{ steps.full_matrix.outputs.enabled }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web_content:
              - 'src/**'
              - 'content/**'
              - 'public/**'
              - 'tests/**'
              - 'migrations/**'
              - 'assets/**'
              - 'cloudflare-worker.mjs'
              - 'cloudflare-env.d.ts'
              - 'wrangler.jsonc'
              - 'open-next.config.ts'
              - 'next.config.ts'
              - 'postcss.config.mjs'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'vitest.setup.ts'
              - 'eslint.config.mjs'
              - 'package.json'
              - 'package-lock.json'
              - 'app-version.json'
              - 'scripts/build-content-artifacts.sh'
              - 'scripts/build-mobile-export.mjs'
              - 'scripts/cloudflare-release-gate.mjs'
              - 'scripts/daily-term-automation.mjs'
              - 'scripts/generate-content-index.mjs'
              - 'scripts/generate-content-index-fallback.rb'
              - 'scripts/generate-missing-reference-entries.mjs'
              - 'scripts/publish-mobile-catalog.mjs'
              - 'scripts/run-opennext-cloudflare.mjs'
              - 'scripts/shared-versioning.mjs'
              - 'scripts/sync-version.mjs'
              - 'scripts/verify-apple-web-signin.mjs'
              - 'scripts/verify-production-web.mjs'
              - 'scripts/with-node.sh'
              - '.github/workflows/ci.yml'
            android:
              - 'android/**'
              - 'native/android/**'
              - 'shared/swift-core/**'
              - 'assets/**'
              - 'app-version.json'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/build-swift-android.sh'
              - 'scripts/fix-android-assets.mjs'
              - 'scripts/run-capacitor-assets.mjs'
              - 'scripts/shared-versioning.mjs'
              - 'scripts/sync-version.mjs'
              - 'scripts/with-android-java.mjs'
              - 'scripts/with-node.sh'
              - '.github/workflows/ci.yml'
            apple:
              - 'ios/**'
              - 'shared/swift-core/**'
              - 'assets/**'
              - 'app-version.json'
              - 'metadata/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/configure-apple-platform-project.rb'
              - 'scripts/generate-apple-assets.mjs'
              - 'scripts/ios-*.mjs'
              - 'scripts/shared-versioning.mjs'
              - 'scripts/sync-version.mjs'
              - 'scripts/with-node.sh'
              - 'scripts/with-xcode.mjs'
              - '.github/workflows/ci.yml'
            shared_swift_core:
              - 'shared/swift-core/**'
              - 'src/generated/**'
              - 'public/mobile-catalog/**'
              - 'app-version.json'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/build-swift-android.sh'
              - 'scripts/shared-versioning.mjs'
              - 'scripts/with-xcode.mjs'
              - '.github/workflows/ci.yml'

      - id: full_matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.full_matrix }}" == "true" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

  web-content:
    needs: changes
    if: needs.changes.outputs.web_content == 'true' || needs.changes.outputs.full_matrix == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:ci
      - run: test -f public/mobile-catalog/manifest.json
      - run: find public/mobile-catalog -maxdepth 1 -name 'entries.*.json' | grep -q .

  android-build:
    needs: changes
    if: needs.changes.outputs.android == 'true' || needs.changes.outputs.full_matrix == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Install Swift 6.3 toolchain
        run: |
          host_arch="$(uname -m)"
          curl -O "https://download.swift.org/swiftly/linux/swiftly-${host_arch}.tar.gz"
          tar zxf "swiftly-${host_arch}.tar.gz"
          ./swiftly init --quiet-shell-followup
          . "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/env.sh"
          hash -r
          swiftly install latest
          swiftly use latest
          swift --version
          swift --version | grep -Eq 'swift-6\.3(\.[0-9]+)?-RELEASE'
          SWIFT_RELEASE_VERSION="$(swift --version | sed -n 's/^Swift version \([0-9][0-9.]*\).*/\1/p')"
          if [[ -z "$SWIFT_RELEASE_VERSION" ]]; then
            echo "Could not determine installed Swift release version" >&2
            exit 1
          fi
          SWIFT_RELEASE_TAG="swift-${SWIFT_RELEASE_VERSION}-RELEASE"
          echo "SWIFT_RELEASE_VERSION=$SWIFT_RELEASE_VERSION" >> "$GITHUB_ENV"
          echo "SWIFT_RELEASE_TAG=$SWIFT_RELEASE_TAG" >> "$GITHUB_ENV"
          echo "${SWIFTLY_HOME_DIR:-$HOME/.local/share/swiftly}/bin" >> "$GITHUB_PATH"
      - name: Install Swift Android SDK
        run: |
          SDK_VERSION="${SWIFT_RELEASE_TAG}_android"
          SDK_URL="https://download.swift.org/swift-${SWIFT_RELEASE_VERSION}-release/android-sdk/${SWIFT_RELEASE_TAG}/${SDK_VERSION}.artifactbundle.tar.gz"
          SDK_ARCHIVE="${RUNNER_TEMP:-/tmp}/${SDK_VERSION}.artifactbundle.tar.gz"
          curl -fSL -o "$SDK_ARCHIVE" "$SDK_URL"
          swift sdk install "$SDK_ARCHIVE"
          rm -f "$SDK_ARCHIVE"
          SDK_BUNDLE="$(find "$HOME" -type d -path "*/${SDK_VERSION}.artifactbundle/swift-android" -print -quit)"
          if [[ -z "$SDK_BUNDLE" ]]; then
            echo "Swift Android SDK bundle not found after installation" >&2
            exit 1
          fi
          cd "$SDK_BUNDLE"
          host_os="$(uname -s)"
          curl -fSL -o ndk.zip "https://dl.google.com/android/repository/android-ndk-r27d-${host_os}.zip"
          unzip -qo ndk.zip
          export ANDROID_NDK_HOME="$PWD/android-ndk-r27d"
          ./scripts/setup-android-sdk.sh
          rm -f ndk.zip
          echo "SWIFT_ANDROID_SDK_BUNDLE=$SDK_BUNDLE" >> "$GITHUB_ENV"
          swift sdk list
      - run: npm ci
      - run: npm run android:ci

  ios-build:
    needs: changes
    if: needs.changes.outputs.apple == 'true' || needs.changes.outputs.full_matrix == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ios:ci

  shared-swift-core:
    needs: changes
    if: needs.changes.outputs.shared_swift_core == 'true' || needs.changes.outputs.full_matrix == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm run swift-core:test

  ci-result:
    needs:
      - changes
      - web-content
      - android-build
      - ios-build
      - shared-swift-core
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report selected CI lanes
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "web-content: ${{ needs.web-content.result }}"
          echo "android-build: ${{ needs.android-build.result }}"
          echo "ios-build: ${{ needs.ios-build.result }}"
          echo "shared-swift-core: ${{ needs.shared-swift-core.result }}"

          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.web-content.result }}" \
            "${{ needs.android-build.result }}" \
            "${{ needs.ios-build.result }}" \
            "${{ needs.shared-swift-core.result }}"
          do
            case "$result" in
              failure|cancelled)
                exit 1
                ;;
            esac
          done
