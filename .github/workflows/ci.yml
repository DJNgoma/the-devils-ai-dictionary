name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build:mobile

  capacitor-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run android:sync
      - run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
      - run: cd android && ./gradlew assembleDebug

  capacitor-ios-sanity:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run ios:sync
      - run: xcodebuild -project ios/App/App.xcodeproj -scheme App -destination "generic/platform=iOS Simulator" build CODE_SIGNING_ALLOWED=NO

  shared-swift-core:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift test --package-path shared/swift-core
