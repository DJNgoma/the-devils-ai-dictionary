name: Daily push dispatch

on:
  schedule:
    # Run every 15 minutes on offset minutes so per-device local-hour sends are
    # picked up without depending on an exact top-of-hour GitHub scheduler start.
    - cron: "2,17,32,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke daily-send
        env:
          PUSH_TEST_SEND_SECRET: ${{ secrets.PUSH_TEST_SEND_SECRET }}
        run: |
          if [ -z "$PUSH_TEST_SEND_SECRET" ]; then
            echo "PUSH_TEST_SEND_SECRET is not set as a repository secret." >&2
            exit 1
          fi

          response=$(curl -sS -o /tmp/daily-send.json -w "%{http_code}" \
            -X POST https://thedevilsaidictionary.com/api/mobile/push/daily-send \
            -H "authorization: Bearer $PUSH_TEST_SEND_SECRET" \
            -H "content-type: application/json" \
            -d '{}')

          cat /tmp/daily-send.json
          echo

          if [ "$response" != "200" ]; then
            echo "daily-send returned HTTP $response" >&2
            exit 1
          fi
