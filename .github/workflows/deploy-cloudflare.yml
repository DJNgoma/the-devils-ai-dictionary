name: Deploy Cloudflare

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      full_cloudflare_preflight:
        description: Run the full Wrangler dry-run and startup preflight before deployment
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web_deploy: ${{ steps.filter.outputs.web_deploy }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web_deploy:
              - 'src/**'
              - 'content/**'
              - 'public/**'
              - 'tests/**'
              - 'migrations/**'
              - 'assets/**'
              - 'cloudflare-worker.mjs'
              - 'cloudflare-env.d.ts'
              - 'wrangler.jsonc'
              - 'open-next.config.ts'
              - 'next.config.ts'
              - 'postcss.config.mjs'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'vitest.setup.ts'
              - 'eslint.config.mjs'
              - 'package.json'
              - 'package-lock.json'
              - 'app-version.json'
              - 'scripts/build-content-artifacts.sh'
              - 'scripts/build-mobile-export.mjs'
              - 'scripts/cloudflare-release-gate.mjs'
              - 'scripts/daily-term-automation.mjs'
              - 'scripts/generate-content-index.mjs'
              - 'scripts/generate-content-index-fallback.rb'
              - 'scripts/generate-missing-reference-entries.mjs'
              - 'scripts/publish-mobile-catalog.mjs'
              - 'scripts/run-opennext-cloudflare.mjs'
              - 'scripts/shared-versioning.mjs'
              - 'scripts/sync-version.mjs'
              - 'scripts/verify-apple-web-signin.mjs'
              - 'scripts/verify-production-web.mjs'
              - 'scripts/with-node.sh'
              - '.github/workflows/deploy-cloudflare.yml'

  validate:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.web_deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate web deploy surface
        run: npm run test:ci

      - name: Validate Cloudflare release gate
        if: github.event_name == 'pull_request'
        run: npm run build:cf && npm run release-gate:cf:built

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.web_deploy == 'true')
    needs:
      - changes
      - validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Skip deploy when Cloudflare credentials are missing
        if: env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "::notice title=Cloudflare deploy skipped::Set CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN to enable production deploys."

      - name: Verify required Cloudflare Worker secrets exist
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: |
          secrets_json=$(npx wrangler secret list --format json)
          node - "$secrets_json" <<'NODE'
          const payload = JSON.parse(process.argv[2]);
          const names = new Set(
            (Array.isArray(payload) ? payload : [])
              .map((entry) => (typeof entry === "string" ? entry : entry?.name))
              .filter(Boolean),
          );

          const required = [
            "APPLE_SESSION_SECRET",
            "APPLE_WEB_CLIENT_ID",
            "APPLE_TEAM_ID",
            "APPLE_KEY_ID",
            "APPLE_PRIVATE_KEY",
            "PUSH_TEST_SEND_SECRET",
          ];

          const missing = required.filter((name) => !names.has(name));

          if (missing.length) {
            console.error(
              `Missing required Cloudflare Worker secrets: ${missing.join(", ")}`,
            );
            process.exit(1);
          }
          NODE

      - name: Run full Cloudflare preflight
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' && github.event_name == 'workflow_dispatch' && inputs.full_cloudflare_preflight
        run: npm run release-gate:cf:dry-run

      - name: Build Cloudflare deployment
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' && (github.event_name != 'workflow_dispatch' || !inputs.full_cloudflare_preflight)
        run: npm run build:cf

      - name: Check Cloudflare release gate
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' && (github.event_name != 'workflow_dispatch' || !inputs.full_cloudflare_preflight)
        run: npm run release-gate:cf:built

      - name: Deploy web to Cloudflare
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: npm run deploy:cf:built

      - name: Verify production web surface
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: npm run verify:production-web

      - name: Verify production web push runtime
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: |
          response=$(curl --fail --silent --show-error https://thedevilsaidictionary.com/api/web/push/config)
          node - "$response" <<'NODE'
          const payload = JSON.parse(process.argv[2]);

          if (!payload.enabled || !payload.publicKey) {
            console.error(
              "Production web push is disabled. Set WEB_PUSH_VAPID_PUBLIC_KEY, WEB_PUSH_VAPID_PRIVATE_KEY, and WEB_PUSH_VAPID_SUBJECT on the Cloudflare worker.",
            );
            process.exit(1);
          }
          NODE

  deploy-result:
    needs:
      - changes
      - validate
      - deploy-production
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report selected deploy lanes
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "validate: ${{ needs.validate.result }}"
          echo "deploy-production: ${{ needs.deploy-production.result }}"

          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.validate.result }}" \
            "${{ needs.deploy-production.result }}"
          do
            case "$result" in
              failure|cancelled)
                exit 1
                ;;
            esac
          done
