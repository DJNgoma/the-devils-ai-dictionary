name: Deploy Cloudflare

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Environment to deploy
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      full_cloudflare_preflight:
        description: Run the full Wrangler dry-run and startup preflight before production deployment
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate web deploy surface
        run: npm run test:ci

      - name: Validate Cloudflare release gate
        if: github.event_name == 'pull_request'
        run: npm run build:cf && npm run release-gate:cf

  deploy-staging:
    name: Deploy Staging
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    environment:
      name: staging
      url: https://staging.thedevilsaidictionary.com
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Skip deploy when Cloudflare credentials are missing
        if: env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "::notice title=Cloudflare staging deploy skipped::Set CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN in the staging environment to enable staging deploys."

      - name: Apply staging D1 migrations
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler d1 migrations apply PUSH_INSTALLATIONS_DB --env staging --remote

      - name: Deploy staging web to Cloudflare
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: npm run release-gate:cf:dry-run:staging && npm run deploy:cf:staging:built

      - name: Verify staging web runtime
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: |
          curl --fail --silent --show-error https://staging.thedevilsaidictionary.com/ >/dev/null
          response=$(curl --fail --silent --show-error https://staging.thedevilsaidictionary.com/api/web/push/config)
          node - "$response" <<'NODE'
          const payload = JSON.parse(process.argv[2]);

          if (!payload.enabled || !payload.publicKey) {
            console.log(
              "::notice title=Staging web push disabled::Set WEB_PUSH_VAPID_PUBLIC_KEY, WEB_PUSH_VAPID_PRIVATE_KEY, and WEB_PUSH_VAPID_SUBJECT on the staging Worker before push testing.",
            );
          }
          NODE

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: https://thedevilsaidictionary.com
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Skip deploy when Cloudflare credentials are missing
        if: env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "::notice title=Cloudflare production deploy skipped::Set CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN in the production environment to enable production deploys."

      - name: Verify required Cloudflare Worker secrets exist
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: |
          secrets_json=$(npx wrangler secret list --format json)
          node - "$secrets_json" <<'NODE'
          const payload = JSON.parse(process.argv[2]);
          const names = new Set(
            (Array.isArray(payload) ? payload : [])
              .map((entry) => (typeof entry === "string" ? entry : entry?.name))
              .filter(Boolean),
          );

          const required = [
            "APPLE_SESSION_SECRET",
            "APPLE_WEB_CLIENT_ID",
            "APPLE_TEAM_ID",
            "APPLE_KEY_ID",
            "APPLE_PRIVATE_KEY",
            "PUSH_TEST_SEND_SECRET",
          ];

          const missing = required.filter((name) => !names.has(name));

          if (missing.length) {
            console.error(
              `Missing required Cloudflare Worker secrets: ${missing.join(", ")}`,
            );
            process.exit(1);
          }
          NODE

      - name: Run full Cloudflare preflight
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' && github.event_name == 'workflow_dispatch' && inputs.full_cloudflare_preflight
        run: npm run release-gate:cf:dry-run

      - name: Build Cloudflare deployment
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' && (github.event_name != 'workflow_dispatch' || !inputs.full_cloudflare_preflight)
        run: npm run build:cf

      - name: Check Cloudflare release gate
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' && (github.event_name != 'workflow_dispatch' || !inputs.full_cloudflare_preflight)
        run: npm run release-gate:cf

      - name: Deploy web to Cloudflare
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: npm run deploy:cf:built

      - name: Verify production web surface
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: npm run verify:production-web

      - name: Verify production web push runtime
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: |
          response=$(curl --fail --silent --show-error https://thedevilsaidictionary.com/api/web/push/config)
          node - "$response" <<'NODE'
          const payload = JSON.parse(process.argv[2]);

          if (!payload.enabled || !payload.publicKey) {
            console.error(
              "Production web push is disabled. Set WEB_PUSH_VAPID_PUBLIC_KEY, WEB_PUSH_VAPID_PRIVATE_KEY, and WEB_PUSH_VAPID_SUBJECT on the Cloudflare worker.",
            );
            process.exit(1);
          }
          NODE
