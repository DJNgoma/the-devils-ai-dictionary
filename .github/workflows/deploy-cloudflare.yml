name: Deploy Cloudflare

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate web deploy surface
        run: npm run test:ci

      - name: Validate Cloudflare release gate
        run: npm run build:cf && npm run release-gate:cf

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Skip deploy when Cloudflare credentials are missing
        if: env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "::notice title=Cloudflare deploy skipped::Set CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN to enable production deploys."

      - name: Verify Apple web auth secrets exist
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: |
          secrets_json=$(npx wrangler secret list --format json)
          node - "$secrets_json" <<'NODE'
          const payload = JSON.parse(process.argv[2]);
          const names = new Set(
            (Array.isArray(payload) ? payload : [])
              .map((entry) => (typeof entry === "string" ? entry : entry?.name))
              .filter(Boolean),
          );

          const required = [
            "APPLE_SESSION_SECRET",
            "APPLE_WEB_CLIENT_ID",
            "APPLE_TEAM_ID",
            "APPLE_KEY_ID",
            "APPLE_PRIVATE_KEY",
          ];

          const missing = required.filter((name) => !names.has(name));

          if (missing.length) {
            console.error(
              `Missing Cloudflare Worker Apple web auth secrets: ${missing.join(", ")}`,
            );
            process.exit(1);
          }
          NODE

      - name: Deploy web to Cloudflare
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: npm run release-gate:cf:dry-run && npm run deploy:cf

      - name: Verify production web surface
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: npm run verify:production-web

      - name: Verify production web push runtime
        if: env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != ''
        run: |
          response=$(curl --fail --silent --show-error https://thedevilsaidictionary.com/api/web/push/config)
          node - "$response" <<'NODE'
          const payload = JSON.parse(process.argv[2]);

          if (!payload.enabled || !payload.publicKey) {
            console.error(
              "Production web push is disabled. Set WEB_PUSH_VAPID_PUBLIC_KEY, WEB_PUSH_VAPID_PRIVATE_KEY, and WEB_PUSH_VAPID_SUBJECT on the Cloudflare worker.",
            );
            process.exit(1);
          }
          NODE
